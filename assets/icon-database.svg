  <line x1="3" y1="9" x2="21" y2="9" stroke="#ffb5c5"/>
  <line x1="3" y1="15" x2="21" y2="15" stroke="#ffb5c5"/>
  <line x1="9" y1="3" x2="9" y2="21" stroke="#ffb5c5"/>
