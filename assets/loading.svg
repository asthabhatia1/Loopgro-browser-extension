<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .spinner-ring {
      transform-origin: 50px 50px;
      animation: spin 2s linear infinite;
    }
    .pulse-heart {
      transform-origin: 50px 50px;
      animation: pulse 1.2s ease-in-out infinite;
    }
  </style>
  
  <!-- Outer dotted ring -->
  <circle class="spinner-ring" cx="50" cy="50" r="30" fill="none" stroke="#ffb5c5" stroke-width="4" stroke-dasharray="10 8"/>
  
  <!-- Center Heart -->
  <path class="pulse-heart" d="M 50 37 
           C 47 30, 35 30, 35 41 
           C 35 52, 50 63, 50 67 
           C 50 63, 65 52, 65 41 
           C 65 30, 53 30, 50 37 Z" 
        fill="#fca1a7" stroke="#ffffff" stroke-width="2"/>
</svg>
