<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 120" width="150" height="120">
  <!-- Cloudy shape shadow -->
  <path d="M 35 70 
           A 20 20 0 0 1 50 40 
           A 28 28 0 0 1 100 40 
           A 20 20 0 0 1 115 70 
           A 15 15 0 0 1 105 90 
           L 45 90 
           A 15 15 0 0 1 35 70 Z" 
        fill="#ffccd5" opacity="0.3" transform="translate(5, 5)"/>
  
  <!-- Cloudy shape -->
  <path d="M 35 70 
           A 20 20 0 0 1 50 40 
           A 28 28 0 0 1 100 40 
           A 20 20 0 0 1 115 70 
           A 15 15 0 0 1 105 90 
           L 45 90 
           A 15 15 0 0 1 35 70 Z" 
        fill="#ffffff" stroke="#ffb5c5" stroke-width="4"/>
  
  <!-- Sleeping eyes (curves) -->
  <path d="M 58 64 Q 63 68 68 64" fill="none" stroke="#5c4a4f" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 82 64 Q 87 68 92 64" fill="none" stroke="#5c4a4f" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Blushing cheeks -->
  <circle cx="52" cy="71" r="5" fill="#fca1a7" opacity="0.7"/>
  <circle cx="98" cy="71" r="5" fill="#fca1a7" opacity="0.7"/>
  
  <!-- Cute little sleep bubbles Zzz -->
  <text x="110" y="35" font-family="'Quicksand', sans-serif" font-weight="bold" font-size="12" fill="#ffb5c5">Z</text>
  <text x="120" y="25" font-family="'Quicksand', sans-serif" font-weight="bold" font-size="16" fill="#ffccd5">z</text>
</svg>
